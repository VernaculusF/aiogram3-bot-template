services:
  postgres:
    image: postgres:16-alpine
    container_name: aiogram-template-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER:-bot_user}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-bot_pass}
      POSTGRES_DB: ${DATABASE_NAME:-bot_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-bot_user} -d ${DATABASE_NAME:-bot_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build: .
    container_name: aiogram-template-bot
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
